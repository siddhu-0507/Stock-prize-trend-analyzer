<!DOCTYPE html>
<html>
<head>
    <title>Stock Price Trend Analyzer</title>
</head>
<body>

<h1>Stock Price Trend Analyzer</h1>

<form method="POST">
    <input type="text" name="ticker" placeholder="Enter Stock Symbol">
    <button type="submit">Analyze</button>
</form>

{% if stock_data %}
<h2>{{ stock_data.ticker }}</h2>
<p>Current Price: ₹{{ stock_data.price }}</p>
<p>Volume: {{ stock_data.volume }}</p>
<p>Signal: {{ signal }}</p>
{% endif %}

</body>
</html>
